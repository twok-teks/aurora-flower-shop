<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex"><title>Studio Login | Aurora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/styles.css">
</head>
<body class="admin-shell">
  <main class="login-layout">
    <section class="login-card" aria-labelledby="login-title">
      <a class="brand" href="index.html"><span class="brand__mark" aria-hidden="true">A</span><strong>Aurora Flowers</strong></a>
      <div><p class="eyebrow">Private studio</p><h1 id="login-title">Welcome back</h1><p>Sign in to care for your flower collection.</p></div>
      <div class="notice" data-auth-message hidden role="status"></div>
      <form data-login-form>
        <label for="email">Email address</label><input id="email" name="email" type="email" autocomplete="email" required>
        <label for="password">Password</label><input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required>
        <button class="button button--primary button--full" type="submit" data-submit>Sign in</button>
      </form>
      <a class="text-link" href="index.html"><span aria-hidden="true">&larr;</span> Return to the shop</a>
    </section>
    <aside class="login-art" aria-hidden="true"><img src="assets/aurora-hero.png" alt=""></aside>
  </main>
  <script type="module" src="js/admin-login.js"></script>
</body>
</html>
